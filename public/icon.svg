<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f0f1a"/>
  <!-- Gradient defs -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Mic body -->
  <rect x="208" y="96" width="96" height="176" rx="48" fill="url(#g)"/>
  <!-- Mic stand arc -->
  <path d="M160 272 Q160 368 256 368 Q352 368 352 272" fill="none" stroke="url(#g)" stroke-width="20" stroke-linecap="round"/>
  <!-- Mic pole -->
  <line x1="256" y1="368" x2="256" y2="416" stroke="url(#g)" stroke-width="20" stroke-linecap="round"/>
  <!-- Mic base -->
  <rect x="196" y="412" width="120" height="20" rx="10" fill="url(#g)"/>
  <!-- Translation dots -->
  <circle cx="152" cy="192" r="12" fill="#3b82f6" opacity="0.7"/>
  <circle cx="120" cy="224" r="8" fill="#3b82f6" opacity="0.5"/>
  <circle cx="96" cy="252" r="6" fill="#3b82f6" opacity="0.3"/>
  <circle cx="360" cy="192" r="12" fill="#8b5cf6" opacity="0.7"/>
  <circle cx="392" cy="224" r="8" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="416" cy="252" r="6" fill="#8b5cf6" opacity="0.3"/>
</svg>
